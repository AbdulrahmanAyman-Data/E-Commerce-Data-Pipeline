services:
  master:
    build:
      context: .
      dockerfile: Dockerfile.master
    image: hadoop-base-master
    container_name: hadoop-master
    hostname: hadoop-master
    networks:
      - shared-data-network
    volumes:
      - hadoop_data_master:/opt/hadoop
    ports:
      - "9870:9870"
      - "8088:8088"
      - "9000:9000"
    command: ["/bin/bash", "-c", "service ssh start && /entrypoint.sh && tail -f /dev/null"]

  slave1:
    build:
      context: .
      dockerfile: Dockerfile.slave
    image: hadoop-slave-image
    container_name: hadoop-slave1
    hostname: hadoop-slave1
    networks:
      - shared-data-network
    volumes:
      - hadoop_data_slave1:/opt/hadoop
    command: ["/bin/bash", "-c", "service ssh start && /opt/hadoop/sbin/hadoop-daemon.sh start datanode && /opt/hadoop/bin/yarn nodemanager && tail -f /dev/null"]

  slave2:
    build:
      context: .
      dockerfile: Dockerfile.slave
    image: hadoop-slave-image
    container_name: hadoop-slave2
    hostname: hadoop-slave2
    networks:
      - shared-data-network
    volumes:
      - hadoop_data_slave2:/opt/hadoop
    command: ["/bin/bash", "-c", "service ssh start && /opt/hadoop/sbin/hadoop-daemon.sh start datanode && /opt/hadoop/bin/yarn nodemanager && tail -f /dev/null"]

  metastore_db:
    image: postgres:13-alpine
    container_name: metastore_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: metastore_db
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hivepassword
    ports:
      - "5432:5432"

    volumes:
      - metastore_db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - shared-data-network

  hive-metastore:
    image: apache/hive:3.1.3
    container_name: hive_metastore
    hostname: hive-metastore
    restart: unless-stopped

    depends_on:
      metastore_db:
        condition: service_healthy

    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      IS_RESUME: "true"
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://metastore_db:5432/metastore_db
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hivepassword

    ports:
      - "9083:9083"

    volumes:
      - ./config/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./config/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - ./config/hadoop/hive-site.xml:/opt/hive/conf/hive-site.xml
      - ./drivers/postgresql-42.7.3.jar:/opt/hive/lib/postgres.jar

    networks:
      - shared-data-network

  trino:
    image: trinodb/trino:latest
    container_name: trino_engine
    restart: unless-stopped
    depends_on:
      - hive-metastore
    ports:
      - "8085:8080"
    volumes:
      - ./config/trino:/etc/trino
      - ./config/hadoop:/opt/hadoop/etc/hadoop
    networks:
      - shared-data-network

networks:
  shared-data-network:
    external: true

volumes:
  hadoop_data_master:
  hadoop_data_slave1:
  hadoop_data_slave2:
  warehouse:
  metastore_db_data:

